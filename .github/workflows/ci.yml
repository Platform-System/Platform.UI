name: Platform.UI CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'Platform.UI/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'Platform.UI/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Platform.UI

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './Platform.UI/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Lint
      run: npm run lint
