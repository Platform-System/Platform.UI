name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: Platform-System/Platform.CI-CD/.github/workflows/build-nextjs.yml@main
    with:
      image_name: 'platform-store-ui'
      push_image: true
      build_args: |
        NEXT_PUBLIC_API_URL=https://api.nyxoris.com
